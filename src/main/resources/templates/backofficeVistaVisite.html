<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Visite Veterinarie</title>
    <link rel="icon" type="image/x-icon" href="/image/favicon.png">
    <link rel="stylesheet" href="/css/backofficeAnimali.css">
</head>

<body>
<!-- Header -->
<header>
    <nav>
        <div class="logo">
            <img src="/image/logo.png" alt="Logo Catarsi Group">
            CATARSI GROUP
        </div>
        <div class="house-icon">
            <a href="/gest">
                <img src="/image/house.svg" alt="casa">
            </a>
        </div>
    </nav>
</header>

<div class="container">
    <div class="main-content">
        <div class="form-container">
            <div class="section-title">LE VISITE</div>

            <div class="animals-table-container">
                <h1>Visite Veterinarie</h1>
                <table style="width: 100%;">
                    <thead>
                    <tr>
                        <th class="header-btn">Data</th>
                        <th class="header-btn">Animale</th>
                        <th class="header-btn">Dottore</th>
                        <th class="header-btn">Descrizione</th>
                        <th></th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr class="table-row" th:each="visita : ${visite}" th:if="${visite != null}">
                        <td th:text="${visita.data_visita}"></td>
                        <td th:text="${visita.animale.nome}"></td>
                        <td th:text="${visita.dottore.nome + ' ' + visita.dottore.cognome}"></td>
                        <td th:text="${visita.descrizione}"></td>
                        <td>
                            <form th:action="@{/visite-veterinarie/{id}(id=${visita.id_visita})}" method="post">
                                <input type="hidden" name="_method" value="delete" />
                                <button type="submit">Elimina</button>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{'/visite-veterinarie/' + ${visita.id_visita} + '/modifica'}" method="get">
                                <button type="submit">Modifica</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="control-buttons" style="margin-top: 60px;">
                <a href="/visite-veterinarie/nuova-visita" class="add-animal-btn">Aggiungi Visita</a>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="footer-content">
        <div class="footer-logo">
            <img src="/image/logo.png" alt="Logo Catarsi">
        </div>
        <div class="footer-right">
            <div class="social-icons">
                <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg">
                </a>
                <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg">
                </a>
                <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg">
                </a>
            </div>
            <div class="footer-credits">
                <p>Crediti alla Fondazione Catarsi</p>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
