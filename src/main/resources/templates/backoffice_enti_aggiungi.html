<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Aggiungi Ente</title>
  <link rel="stylesheet" href="/css/backofficeenti.css">
</head>
<body>
  <header class="bo-header">
    <nav class="bo-nav"><div class="bo-logo">🟢 Aggiungi Ente</div></nav>
  </header>
  <section class="bo-section">
    <form id="addForm" class="bo-form">
      <label class="bo-label">Nome</label><input name="nome" class="bo-input" required>
      <label class="bo-label">Email</label><input name="email" type="email" class="bo-input" required>
      <label class="bo-label">Telefono</label><input name="telefono" class="bo-input">
      <button type="submit" class="bo-btn">Salva Ente</button>
    </form>
    <p id="msg"></p>
  </section>
  <script>
    document.getElementById('addForm').onsubmit = e => {
      e.preventDefault();
      const data = {
        nome: e.target.nome.value,
        email: e.target.email.value,
        telefono: e.target.telefono.value || null
      };
      fetch('/api/enti', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
      }).then(res => res.json())
        .then(ent => msg.textContent = 'Ente creato con ID ' + ent.id_ente)
        .catch(err => msg.textContent = 'Errore: ' + err);
    }
  </script>
</body>
</html>
