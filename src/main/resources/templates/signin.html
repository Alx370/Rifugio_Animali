<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/image/favicon.png">
  <link rel="stylesheet" href="/css/signin.css">
  <title>Registrazione Utente</title>
</head>
<body>

<!-- Header -->
<header>
  <nav>
    <div class="logo">
      <img src="/image/logo.png" alt="Logo Catarsi Group">
      CATARSI GROUP
    </div>
    <div class="house-icon">
      <a href="/index.html">
        <img src="/image/house.svg" alt="casa">
      </a>
    </div>
  </nav>
</header>

<!-- Sezione Registrazione -->
<section class="registration-section">
  <div class="section-title">REGISTRAZIONE</div>

  <div class="container">
    <form th:action="@{/signin}" method="post">
      <div class="form-group">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
      </div>

      <div class="form-group">
        <label for="cognome">Cognome:</label>
        <input type="text" id="cognome" name="cognome" required>
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      </div>

      <div class="form-group">
        <label for="telefono">Numero di telefono:</label>
        <input type="tel" id="telefono" name="telefono" required pattern="[0-9]{10}" placeholder="es. 3331234567">
      </div>
      <div class="form-group">
        <label for="sesso">Sesso:</label>
        <select id="sesso" name="sesso" required>
          <option value="">--Seleziona--</option>
          <option value="m">Maschio</option>
          <option value="f">Femmina</option>
          <option value="a">Altro</option>
        </select>
      </div>

      <div class="form-group">
        <label for="dataNascita">Data di nascita:</label>
        <input type="date" id="dataNascita" name="dataNascita" required>
      </div>
      <button type="submit">Invia</button>
    </form>

    <h2>oppure</h2>
    <div class="back-home">
      <a th:href="@{/}" class="home-button">Torna alla Home</a>
    </div>
  </div>
</section>

<!-- Footer Section -->
<footer class="footer">
  <div class="footer-content">
    <div class="footer-logo">
      <img src="/image/logo.png" alt="Logo Catarsi">
    </div>
    <div class="footer-right">
      <div class="social-icons">
        <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
          <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg">
        </a>
        <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
          <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg">
        </a>
        <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
          <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg">
        </a>
      </div>
      <div class="footer-credits">
        <p>Crediti alla Fondazione Catarsi</p>
      </div>
    </div>
  </div>
</footer>

</body>
</html>
