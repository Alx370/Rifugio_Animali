<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registrazione Utente</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #c3f798;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .logo-container {
      text-align: center;
      margin-bottom: 15px;
    }
    .logo-img {
      max-width: 100px;
      height: auto;
    }
    .intro-text {
      text-align: center;
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    h2 {
      text-align: center;
    }
    .back-home {
      margin-top: 15px;
      text-align: center;
    }
    .home-button {
      background-color: #2196F3;
      padding: 10px 20px;
      color: white;
      border: none;
      border-radius: 5px;
      text-decoration: none;
      display: inline-block;
    }
    .home-button:hover {
      background-color: #1976D2;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <img src="/image/logo.png" alt="Logo Rifugio" class="logo-img">
    </div>

    <h2>Registrazione</h2>
    <p class="intro-text">Unisciti a noi per offrire una nuova casa agli animali che ne hanno bisogno. Compila il modulo per diventare parte della famiglia Catarsi.</p>

    <form th:action="@{/signin}" method="post">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" required>

      <label for="cognome">Cognome:</label>
      <input type="text" id="cognome" name="cognome" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required>

      <label for="telefono">Numero di telefono:</label>
      <input type="tel" id="telefono" name="telefono" required pattern="[0-9]{10}" placeholder="es. 3331234567">

      <label for="sesso">Sesso:</label>
      <select id="sesso" name="sesso" required>
        <option value="">--Seleziona--</option>
        <option value="m">Maschio</option>       
        <option value="f">Femmina</option>
        <option value="a">Altro</option>
      </select>

      <label for="dataNascita">Data di nascita:</label>
      <input type="date" id="dataNascita" name="dataNascita" required> 

      <button type="submit">Invia</button>
    </form>
    <h2>oppure</h2>
    <div class="back-home">
      <a th:href="@{/}" class="home-button">Torna alla Home</a>
    </div>
  </div>

</body>
</html>
