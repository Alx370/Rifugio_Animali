<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica Visita Veterinaria</title>
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >
    <link rel="stylesheet" href="/css/backofficeAggiungi.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="/image/logo.png" alt="Logo Catarsi Group">
                CATARSI GROUP
            </div>
            <div class="house-icon">
                <a href="/">
                    <img src="/image/house.svg" alt="casa">
                </a>
            </div>
        </nav>
    </header>
    <main class="container">
        <h2>Modifica Visita Veterinaria</h2>

        <form th:object="${visita}" th:action="@{'/visite-veterinarie/' + ${visita.id_visita}}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="_method" value="put" />

            <!-- Data visita -->
            <div class="form-group">
                <label for="data_visita">Data visita</label>
                <input type="date" th:field="*{data_visita}" required />
            </div>

            <!-- Animale -->
            <div class="form-group">
                <label for="animale">Animale</label>
                <select th:field="*{animale}" required>
                    <option value="" disabled selected>-- Seleziona un animale --</option>
                    <option th:each="animale : ${animali}"
                            th:value="${animale.id_animale}"
                            th:text="${animale.nome}">
                    </option>
                </select>
            </div>

            <!-- Dottore -->
            <div class="form-group">
                <label for="dottore">Dottore</label>
                <select th:field="*{dottore}" required>
                    <option value="" disabled selected>-- Seleziona un dottore --</option>
                    <option th:each="dottore : ${dottori}"
                            th:value="${dottore.id_dottore}"
                            th:text="${dottore.nome + ' ' + dottore.cognome}">
                    </option>
                </select>
            </div>

            <!-- Descrizione -->
            <div class="form-group">
                <label for="descrizione">Descrizione</label>
                <textarea th:field="*{descrizione}" rows="4" placeholder="Inserisci la descrizione..."></textarea>
            </div>

            <button type="submit" class="btn-primary">Salva La Visita</button>
        </form>
    </main>
</body>
   <!-- Footer Section -->
<footer class="footer">
    <div class="footer-content">
        <div class="footer-logo">
            <img src="/image/logo.png" alt="Logo Catarsi">
        </div>
        <div class="footer-right">
            <div class="social-icons">
                <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg">
                </a>
                <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg">
                </a>
                <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg">
                </a>
            </div>
            <div class="footer-credits">
                <p>Crediti alla Fondazione Catarsi</p>
            </div>
        </div>
    </div>
</footer>
</html>
