<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adozione Animali</title>
    <link rel="stylesheet" href="/css/backofficeAggiungi.css">

</head>
<header>
    <nav>
        <div class="logo">
            <img src="/image/logo.png" alt="Logo Catarsi Group">
            CATARSI GROUP
        </div>
        <div class="house-icon">
            <a href="/">
                <img src="/image/house.svg" alt="casa">
            </a>
        </div>
    </nav>
</header>

<body>
    <div class="container">
        <div class="header">
        </div>


        <div class="main-content">
            <div class="form-container">
                <h2>Adotta</h2>
                <form id="animalForm" method="post" th:action="@{/backoffice/adozioni/add}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    
                    <!-- <div class="form-group">
                        <label for="Id_utente">Id utente</label>
                        <input type="text" class="form-control" id="Id_utente" name="Id_utente" required>
                    </div> -->

                    <input type="hidden" id="Id_utente" name="Id_utente" th:value="${utenteLoggato.email}" />
<span th:text="${utenteLoggato.nome + ' ' + utenteLoggato.cognome + ' (' + utenteLoggato.email + ')'}"></span>

                    <div class="form-group">
                        <label for="Id_animale">Id animale</label>
                        <input type="text" class="form-control" id="Id_animale" name="Id_animale" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="dataAdozione">Data di adozione</label>
                        <input type="date" class="form-control" id="dataAdozione" name="dataAdozione" required>
                    </div>

                    <button type="submit" class="btn-primary">Aggiungi Animale</button>
                </form>
            </div>

            
        </div>
    </div>

    <!-- Footer Section -->
<footer class="footer">
    <div class="footer-content">
        <div class="footer-logo">
            <img src="/image/logo.png" alt="Logo Catarsi">
        </div>
        <div class="footer-right">
            <div class="social-icons">
                <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg">
                </a>
                <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg">
                </a>
                <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg">
                </a>
            </div>
            <div class="footer-credits">
                <p>Crediti alla Fondazione Catarsi</p>
            </div>
        </div>
    </div>
</footer>


</body>
</html>
