<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adozione Animali</title>
    <link rel="stylesheet" href="/css/backofficeAggiungi.css">

</head>
<header>
    <nav>
        <div class="logo">
            <img src="/image/logo.png" alt="Logo Catarsi Group">
            CATARSI GROUP
        </div>
        <div class="house-icon">
            <a href="/">
                <img src="/image/house.svg" alt="casa">
            </a>
        </div>
    </nav>
</header>

<body>
    <div class="container">
        <div class="header">
        </div>


        <div class="main-content">
            <div class="form-container">
                <h2>Adotta</h2>
                <form id="animalForm" method="post" th:action="@{/backoffice/adozioni/add}">
                    <th:block th:if="${_csrf != null}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    </th:block>
                    <div class="form-group" >
                        <label for="Id_utente">Utente<br><br></label>
                <th:block th:if="${utenteLoggato != null}">
                    <input type="hidden" name="idUtente" th:value="${utenteLoggato.id_utente}" />
                    <span class="form-control" th:text="${utenteLoggato.nome + ' ' + utenteLoggato.cognome + ' (' + utenteLoggato.email + ')'}"></span>
                </th:block>

                <th:block th:if="${utenteLoggato == null}">
                    <span>Utente non loggato</span>
                </th:block>
</div>


                    <div class="form-group">
                        <label>Animale da adottare</label>
                        <input type="hidden" name="idAnimale" th:value="${animaleSelezionato.id_animale}" />
                        <input type="text" class="form-control" th:value="${animaleSelezionato.nome}" readonly />
                    </div>

                    <button type="submit" class="btn-primary">Conferma adoption</button>
                </form>
            </div>

            
        </div>
    </div>

    <!-- Footer Section -->
<footer class="footer">
    <div class="footer-content">
        <div class="footer-logo">
            <img src="/image/logo.png" alt="Logo Catarsi">
        </div>
        <div class="footer-right">
            <div class="social-icons">
                <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg">
                </a>
                <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg">
                </a>
                <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg">
                </a>
            </div>
            <div class="footer-credits">
                <p>Crediti alla Fondazione Catarsi</p>
            </div>
        </div>
    </div>
</footer>


</body>
</html>
