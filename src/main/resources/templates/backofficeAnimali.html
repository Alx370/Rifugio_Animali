<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Animali</title>
    <link rel="icon" type="image/x-icon" href="/image/favicon.png">
  <link rel="stylesheet" href="/css/backofficeAnimali.css">
</head>
<body>
      <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <img src="/image/logo.png" alt="Logo Catarsi Group">
                
                CATARSI GROUP
              </div>
              
            <div class="house-icon"><a href="/index.html"><img src="/image/house.svg" alt="casa"></a>
            </div>
        </nav>
    </header>
    
    <!-- Sezione I Nostri Animali -->
<section class="animals-section">
    <div class="section-title">I NOSTRI ANIMALI</div>

                
<div class="animals-table-container">
  <table style="width: 100%;">
    <thead>
      <tr>
        <th class="header-btn">Nome</th>
        <th class="header-btn">Sesso</th>
        <th class="header-btn">Specie</th>
        <th class="header-btn">Razza</th>
        <th class="header-btn">Peso</th>
        <th class="header-btn">Età</th>
      </tr>
    </thead>
    <tbody >
      <tr class="table-row" onclick="selectRow(this)" th:each="animale : ${animali}">
        <td>
          <a th:href="@{/animali/dettaglio/{id}(id=${animale.Id_animale})}" th:text="${animale.nome}"></a>
        </td>
        <td th:text="${animale.sesso}"></td>
        <td th:text="${animale.specie}"></td>
        <td th:text="${animale.razza}"></td>
        <td th:text="|${animale.peso} kg|"></td>
        <td th:text="|${animale.eta} anni|"></td>
        <td>
          <a class="delete-animal-btn" id="deleteBtn" th:href="@{'/animali/delete/' + ${animale.Id_animale}}">Elimina</a>
      </td>
          <td>
              <a id="updateBtn" class="update-animal-btn" th:href="@{'/animali/edit/' + ${animale.id_animale}}">Modifica</a>
          </td>
      </tr>
    </tbody>
  </table>
</div>
        <!-- Bottoni di controllo -->
            <div class="control-buttons">
                <a href="/backoffice/animali/add" class="add-animal-btn" onclick="addAnimal()">
                    ➕ Aggiungi Animale
                </a>

                <a href="/backoffice/diario/add" class="add-diario-btn" onclick="addAnimal()">
                    ➕ Aggiungi Diario
                </a>

                <!-- <button class="update-animal-btn" onclick="updateSelectedAnimal()" id="updateBtn" disabled>
                    ✏️ Modifica Selezionato
                </button> -->
            </div>
</section>

<!-- Footer Section -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <img src="/image/logo.png" alt="Logo Catarsi">
            </div>
            <div class="footer-right">
                <div class="social-icons">
                    <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg"></a>
                    <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg"></a>
                    <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg"></a>
                </div>
                <div class="footer-credits">
                    <p>Crediti alla Fondazione Catarsi</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
