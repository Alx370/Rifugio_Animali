<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Backoffice Enti - Vista</title>
  <link rel="stylesheet" href="/css/backofficeenti.css">
</head>
<body>
  <header class="bo-header">
    <nav class="bo-nav">
      <div class="bo-logo">🌿 Backoffice Enti</div>
    </nav>
  </header>
  <section class="bo-section">
    <h1 class="bo-section-title">Elenco Enti</h1>
    <div class="bo-table-container">
      <table id="entiTable">
        <thead>
          <tr><th>ID</th><th>Nome</th><th>Email</th><th>Telefono</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
  <script>
    fetch('/api/enti')
      .then(res => res.json())
      .then(data => {
        const tbody = document.querySelector('#entiTable tbody');
        data.forEach(e => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${e.id_ente}</td><td>${e.nome}</td><td>${e.email}</td><td>${e.telefono || ''}</td>`;
          tbody.appendChild(tr);
        });
      })
      .catch(console.error);
  </script>
</body>
</html>
