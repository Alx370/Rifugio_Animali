<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Animali</title>
    <link rel="icon" type="image/x-icon" href="/image/favicon.png">
  <link rel="stylesheet" href="/css/backofficeAnimali.css">
</head>
<body>
      <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <img src="/image/logo.png" alt="Logo Catarsi Group">
                
                CATARSI GROUP
              </div>
              
            <div class="house-icon"><a href="/gest"><img src="/image/house.svg" alt="casa"></a>
            </div>
        </nav>
    </header>
    

<section class="animals-section">
    <div class="section-title">LE DONAZIONI EFFETTUATE</div>

                
<div class="animals-table-container">
  <table style="width: 100%;">
    <thead>
      <tr>
        <th class="header-btn">Email Utente</th>
        <th class="header-btn">Data</th>
        <th class="header-btn">Somma</th>
      </tr>
    </thead>
    <tbody id="utenteTableBody">
        <tr th:each="donation : ${donazioni}">
        <td th:text="${donation.utente.email}"></td>
        <td th:text="${donation.data}"></td>
        <td th:text="${donation.somma}"></td>
      </tr>
        

    </tbody>
  </table>
</div>
<!-- Bottoni di controllo
            <div class="control-buttons">
                <a href="/backoffice/adozioni/add" class="add-animal-btn" onclick="addAdozione()">
                    Aggiungi Donazione
                </a>
            </div> -->
</section>

<!-- Footer Section -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <img src="/image/logo.png" alt="Logo Catarsi">
            </div>
            <div class="footer-right">
                <div class="social-icons">
                    <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg"></a>
                    <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg"></a>
                    <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg"></a>
                </div>
                <div class="footer-credits">
                    <p>Crediti alla Fondazione Catarsi</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
