<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aggiungi Visita</title>
    <link rel="stylesheet" href="/css/backofficeAggiungi.css">
</head>

<body>
<header>
    <nav>
        <div class="logo">
            <img src="/image/logo.png" alt="Logo Catarsi Group">
            CATARSI GROUP
        </div>
        <div class="house-icon">
            <a href="/gest"><img src="/image/house.svg" alt="casa"></a>
        </div>
    </nav>
</header>

<div class="container">
    <div class="main-content">

        <div class="form-container">
        <h2>Aggiungi Nuova Visita Veterinaria</h2>

        <form method="post" th:action="@{/visite-veterinarie/nuova-visit}" th:object="${visit}">
            <input type="hidden" class="form-control" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <!-- Data visit -->
            <div class="form-group">
                <label for="data_visita">Data visit</label>
                <input type="date" class="form-control"th:field="*{data_visita}" id="data_visita" required />
            </div>

            <!-- Animale -->
            <div class="form-group">
                <label for="animale">Animale</label>
                <select class="form-control" th:field="*{animale}" id="animale" required>
                    <option value="" disabled selected>-- Seleziona un animale --</option>
                    <option th:each="animale : ${animali}"
                            th:value="${animale.id_animale}"
                            th:text="${animale.nome}">
                    </option>
                </select>
            </div>

            <!-- Dottore -->
            <div class="form-group">
                <label for="dottore">Dottore</label>
                <select class="form-control" th:field="*{dottore}" id="dottore" required>
                    <option value="" disabled selected>-- Seleziona un dottore --</option>
                    <option th:each="dottore : ${dottori}"
                            th:value="${dottore.id_dottore}"
                            th:text="${dottore.nome + ' ' + dottore.cognome}">
                    </option>
                </select>
                
            </div>

            <!-- Descrizione -->
            <div class="form-group">
                <label for="descrizione">Descrizione</label>
                <textarea class="form-control" th:field="*{descrizione}" id="descrizione" rows="4" placeholder="Inserisci la descrizione..."></textarea>
            </div>
            
            <button type="submit" class="btn-primary">Aggiungi Visita</button>
        </form>
    </div>
    </div>
    </div>
<footer class="footer">
    <div class="footer-content">
        <div class="footer-logo">
            <img src="/image/logo.png" alt="Logo Catarsi">
        </div>
        <div class="footer-right">
            <div class="social-icons">
                <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/facebook-icon.svg" alt="Facebook"></a>
                <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/instagram-icon.svg" alt="Instagram"></a>
                <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/tiktok-icon.svg" alt="TikTok"></a>
            </div>
            <div class="footer-credits">
                <p>Crediti alla Fondazione Catarsi</p>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
