<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aggiungi Visita</title>
    <link rel="stylesheet" href="/css/backofficeAggiungi.css">
</head>

<body>
<header>
    <nav>
        <div class="logo">
            <img src="/image/logo.png" alt="Logo Catarsi Group">
            CATARSI GROUP
        </div>
        <div class="house-icon">
            <a href="/gest"><img src="/image/house.svg" alt="casa"></a>
        </div>
    </nav>
</header>

<div class="container">
    <div class="main-content">

        <div class="form-container">
        <h2>Aggiungi Nuova Visita Veterinaria</h2>

        <form method="post" th:action="@{/visite-veterinarie/nuova-visita}" th:object="${visit}">
            <input type="hidden" class="form-control" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label for="visitDate">Data visita</label>
                <input type="date" class="form-control" th:field="*{visitDate}" id="visitDate" required />
            </div>

            <div class="form-group">
                <label for="animale">Animale</label>
                <select class="form-control" th:field="*{animal.id}" id="animale" required>
                    <option value="" disabled selected>-- Seleziona un animale --</option>
                    <option th:each="animale : ${animali}"
                            th:value="${animale.id}"
                            th:text="${animale.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="dottore">Dottore</label>
                <select class="form-control" th:field="*{veterinarian.id}" id="dottore" required>
                    <option value="" disabled selected>-- Seleziona un dottore --</option>
                    <option th:each="dottore : ${dottori}"
                            th:value="${dottore.id}"
                            th:text="${dottore.firstName + ' ' + dottore.lastName}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="visitType">Tipo visita</label>
                <input type="text" class="form-control" th:field="*{visitType}" id="visitType" />
            </div>

            <div class="form-group">
                <label for="descrizione">Descrizione</label>
                <textarea class="form-control" th:field="*{description}" id="descrizione" rows="4" placeholder="Inserisci la descrizione..."></textarea>
            </div>

            <div class="form-group">
                <label for="cost">Costo</label>
                <input type="number" class="form-control" th:field="*{cost}" id="cost" min="0" step="0.01" />
            </div>

            <button type="submit" class="btn-primary">Aggiungi Visita</button>
        </form>
    </div>
    </div>
    </div>
<footer class="footer">
    <div class="footer-content">
        <div class="footer-logo">
            <img src="/image/logo.png" alt="Logo Catarsi">
        </div>
        <div class="footer-right">
            <div class="social-icons">
                <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/facebook-icon.svg" alt="Facebook"></a>
                <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/instagram-icon.svg" alt="Instagram"></a>
                <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/tiktok-icon.svg" alt="TikTok"></a>
            </div>
            <div class="footer-credits">
                <p>Crediti alla Fondazione Catarsi</p>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
