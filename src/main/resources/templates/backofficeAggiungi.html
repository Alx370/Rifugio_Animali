<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Animali</title>
    <link rel="stylesheet" href="/css/backofficeAggiungi.css">

</head>
<header>
    <nav>
        <div class="logo">
            <img src="/image/logo.png" alt="Logo Catarsi Group">
            CATARSI GROUP
        </div>
        <div class="house-icon">
            <a href="/">
                <img src="/image/house.svg" alt="casa">
            </a>
        </div>
    </nav>
</header>

<body>
    <div class="container">
        <div class="header">
        </div>


        <div class="main-content">
            <div class="form-container">
                <h2>Aggiungi Nuovo Animale</h2>
                <form id="animalForm" method="post" th:action="@{/backoffice/animali/add}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" class="form-control" id="nome" name="nome" required>
                    </div>
                    <div class="form-group">
                        <label for="sesso">Sesso</label>
                        <input type="text" class="form-control" id="sesso" name="sesso" required>
                    </div>
                    <div class="form-group">
                        <label for="specie">Specie</label>
                        <input type="text" class="form-control" id="specie" name="specie" required>
                    </div>
                    <div class="form-group">
                        <label for="razza">Razza</label>
                        <input type="text" class="form-control" id="razza" name="razza" required>
                    </div>
                    <div class="form-group">
                        <label for="peso">Peso</label>
                        <input type="number" class="form-control" id="peso" name="peso" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="eta">Età</label>
                        <input type="number" class="form-control" id="eta" name="eta" required>
                    </div>
                    <div class="form-group">
                        <label for="colore">Colore</label>
                        <input type="text" class="form-control" id="colore" name="colore" required>
                    </div>
                    <div class="form-group">
                        <label for="taglia">Taglia</label>
                        <input type="text" class="form-control" id="taglia" name="taglia" required>
                    </div>
                    <div class="form-group">
                        <label for="data_arrivo">Data di arrivo</label>
                        <input type="date" class="form-control" id="data_arrivo" name="data_arrivo" required>
                    </div>
                    <!-- <div class="form-group">
                        <label for="dataAdozione">Data di adozione</label>
                        <input type="date" class="form-control" id="dataAdozione" name="dataAdozione" required>
                    </div> -->

                    <button type="submit" class="btn-primary">Aggiungi Animale</button>
                </form>
            </div>

            
        </div>
    </div>

    <!-- Footer Section -->
<footer class="footer">
    <div class="footer-content">
        <div class="footer-logo">
            <img src="/image/logo.png" alt="Logo Catarsi">
        </div>
        <div class="footer-right">
            <div class="social-icons">
                <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg">
                </a>
                <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg">
                </a>
                <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg">
                </a>
            </div>
            <div class="footer-credits">
                <p>Crediti alla Fondazione Catarsi</p>
            </div>
        </div>
    </div>
</footer>


</body>
</html>
