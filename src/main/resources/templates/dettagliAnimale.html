<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dettagli Animale</title>
    <link rel="stylesheet" href="/css/dettagliAnimali.css">
</head>
<body>
<div class="container">
    <h1 th:text="'Dettagli di ' + ${animale.nome}">Dettagli</h1>

    <ul>
        <li><strong>Nome:</strong> <span th:text="${animale.nome}"></span></li>
        <li><strong>Specie:</strong> <span th:text="${animale.specie}"></span></li>
        <li><strong>Razza:</strong> <span th:text="${animale.razza}"></span></li>
        <li><strong>Peso:</strong> <span th:text="${animale.peso} + ' kg'"></span></li>
        <li><strong>Età:</strong> <span th:text="${animale.eta} + ' anni'"></span></li>
        <li><strong>Taglia:</strong> <span th:text="${animale.taglia}"></span></li>
        <li><strong>Colore:</strong> <span th:text="${animale.colore}"></span></li>
        <li><strong>Data di arrivo:</strong> <span th:text="${animale.data_arrivo}"></span></li>
        <li><strong>Data di adozione:</strong> <span th:text="${animale.data_adozione}"></span></li>
    </ul>



    <h1 th:text="'Diario di ' + ${animale.nome}">Diario</h1>

<ul>
    <li th:each="diario : ${diari}">
        <strong>Storia dell'animale:</strong> <span th:text="${diario.storia_animale}"></span><br/>
        <strong>Stato di salute:</strong> <span th:text="${diario.stato_salute}"></span><br/>
        <strong>Stato comportamentale:</strong> <span th:text="${diario.stato_comportamentale}"></span><br/>
        <strong>Vaccinazioni:</strong> <span th:text="${diario.vaccinazioni}"></span><br/>
        <strong>Operazioni effettuate:</strong> <span th:text="${diario.operazioni_effettuate}"></span>
    </li>
</ul>


    <a href="/animali">← Torna alla lista</a> 
    
</div> 
</body>
</html>
