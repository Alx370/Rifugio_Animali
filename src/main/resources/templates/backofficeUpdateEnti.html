<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aggiungi Ente</title>
  <link rel="stylesheet" href="/css/backofficeAggiungi.css" />
</head>
<body>
<header>
  <nav>
    <div class="logo">
      <img src="/image/logo.png" alt="Logo Catarsi Group" />
      CATARSI GROUP
    </div>
    <div class="house-icon">
      <a href="/">
        <img src="/image/house.svg" alt="casa" />
      </a>
    </div>
  </nav>
</header>

<div class="container">
  <div class="main-content">
    <div class="form-container">
      <h2>Aggiungi Nuovo Ente</h2>
      <form id="enteForm" method="post" th:action="@{/backoffice/enti/aggiungi}" th:object="${ente}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <input type="hidden" th:field="*{id_ente}" />

        <div class="form-group">
          <label for="nome">Nome</label>
          <input type="text" class="form-control" th:field="*{nome}" id="nome" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" class="form-control" th:field="*{email}" id="email" required />
        </div>

        <div class="form-group">
          <label for="telefono">Telefono</label>
          <input type="text" class="form-control" th:field="*{telefono}" id="telefono" />
        </div>

        <button type="submit" class="btn-primary">Salva Ente</button>
      </form>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-content">
    <div class="footer-logo">
      <img src="/image/logo.png" alt="Logo Catarsi" />
    </div>
    <div class="footer-right">
      <div class="social-icons">
        <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
          <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg" />
        </a>
        <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
          <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg" />
        </a>
        <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
          <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg" />
        </a>
      </div>
      <div class="footer-credits">
        <p>Crediti alla Fondazione Catarsi</p>
      </div>
    </div>
  </div>
</footer>
</body>
</html>
