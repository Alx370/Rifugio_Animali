<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestione Animali</title>
    <link rel="stylesheet" href="/css/backofficeAggiungi.css" />
</head>
<body>
<header>
    <nav>
        <div class="logo">
            <img src="/image/logo.png" alt="Logo Catarsi Group" />
            CATARSI GROUP
        </div>
        <div class="house-icon">
            <a href="/gest">
                <img src="/image/house.svg" alt="casa" />
            </a>
        </div>
    </nav>
</header>

<div class="container">
    <div class="main-content">
        <div class="form-container">
            <h2>Aggiungi Nuovo Diario</h2>
            <form id="diarioForm" method="post" th:action="@{/backoffice/diary/add}" th:object="${diary}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <input type="hidden" th:field="*{id_diario}" />

                <label>Animale</label>
                <input type="hidden" th:field="*{animale.Id_animale}" />
                <input type="text" th:value="*{animale.nome}" readonly />

                <div class="form-group">
                    <label for="storia_animale">Storia dell'animale</label>
                    <input type="text" th:field="*{storia_animale}" id="storia_animale" required />
                </div>
                <div class="form-group">
                    <label for="stato_salute">Stato di salute</label>
                    <input type="text" th:field="*{stato_salute}" id="stato_salute" required />
                </div>
                <div class="form-group">
                    <label for="stato_comportamentale">Stato comportamentale</label>
                    <input type="text" th:field="*{stato_comportamentale}" id="stato_comportamentale" required />
                </div>
                <div class="form-group">
                    <label for="vaccinazioni">Vaccinazioni</label>
                    <input type="text" th:field="*{vaccinazioni}" id="vaccinazioni" required />
                </div>
                <div class="form-group">
                    <label for="operazioni_effettuate">Operazioni effettuate</label>
                    <input type="text" th:field="*{operazioni_effettuate}" id="operazioni_effettuate" required />
                </div>

                <button type="submit" class="btn-primary">Salva Informazioni Diario</button>
            </form>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="footer-content">
        <div class="footer-logo">
            <img src="/image/logo.png" alt="Logo Catarsi" />
        </div>
        <div class="footer-right">
            <div class="social-icons">
                <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg" />
                </a>
                <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg" />
                </a>
                <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg" />
                </a>
            </div>
            <div class="footer-credits">
                <p>Crediti alla Fondazione Catarsi</p>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
