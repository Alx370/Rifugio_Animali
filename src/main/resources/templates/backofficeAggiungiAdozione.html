<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestione Animali</title>
    <link rel="stylesheet" href="/css/backofficeAggiungi.css" />
</head>
<body>
<header>
    <nav>
        <div class="logo">
            <img src="/image/logo.png" alt="Logo Catarsi Group" />
            CATARSI GROUP
        </div>
        <div class="house-icon">
            <a href="/gest">
                <img src="/image/house.svg" alt="casa" />
            </a>
        </div>
    </nav>
</header>

<div class="container">
    <div class="main-content">
        <div class="form-container">
            <h2>Aggiungi Nuova Adozione</h2>
            <form id="adozioneForm" method="post" th:action="@{/backoffice/adozioni/add}" th:object="${adozione}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <label for="utente">Utente</label>
                <select th:field="*{utente}" required>
                    <option value="" disabled selected>-- Seleziona un utente --</option>
                    <option th:each="utente : ${utenti}"
                            th:value="${utente.id_utente}"
                            th:text="${utente.nome}">
                    </option>
                </select>

                <label for="animale">Animale</label>
                <select th:field="*{animale}" required>
                    <option value="" disabled selected>-- Seleziona un animale --</option>
                    <option th:each="animale : ${animali}"
                            th:value="${animale.id_animale}"
                            th:text="${animale.nome}">
                    </option>
                </select>

                <div class="form-group">
                    <label for="data_adozione">Data adozione</label>
                    <input type="date" class="form-control" th:field="*{data_adozione}" id="data_adozione" required />
                </div>
                

                <button type="submit" class="btn-primary">Aggiungi Adozione</button>
            </form>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="footer-content">
        <div class="footer-logo">
            <img src="/image/logo.png" alt="Logo Catarsi" />
        </div>
        <div class="footer-right">
            <div class="social-icons">
                <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg" />
                </a>
                <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg" />
                </a>
                <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg" />
                </a>
            </div>
            <div class="footer-credits">
                <p>Crediti alla Fondazione Catarsi</p>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
