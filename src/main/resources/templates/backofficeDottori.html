<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Animali</title>
    <link rel="icon" type="image/x-icon" href="/image/favicon.png">
  <link rel="stylesheet" href="/css/backofficeAnimali.css">
</head>
<body>
      <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <img src="/image/logo.png" alt="Logo Catarsi Group">
                
                CATARSI GROUP
              </div>
              
            <div class="house-icon"><a href="/gest"><img src="/image/house.svg" alt="casa"></a>
            </div>
        </nav>
    </header>
    
<section class="animals-section">
    <div class="section-title">I NOSTRI DOTTORI</div>

                
<div class="animals-table-container">
  <table style="width: 100%;">
    <thead>
      <tr>
        <th class="header-btn">Nome</th>
        <th class="header-btn">Cognome</th>
        <th class="header-btn">Email</th>
        <th class="header-btn">Telefono</th>
        <th class="header-btn">Sesso</th>
      </tr>
    </thead>
    <tbody >
      <tr class="table-row" onclick="selectRow(this)" th:each="dottore : ${dottori}">

        <td th:text="${dottore.nome}"></td>
        <td th:text="${dottore.cognome}"></td>
        <td th:text="${dottore.email}"></td>
        <td th:text="${dottore.telefono}"></td>
        <td th:text="${dottore.sesso}"></td>
        <td>
          <a class="delete-animal-btn" id="deleteBtn" th:href="@{'/dottori/delete/' + ${dottore.Id_dottore}}">Elimina</a>
      </td>
          <td>
              <a id="updateBtn" class="update-animal-btn" th:href="@{'/dottore/edit/' + ${dottore.id_dottore}}">Modifica</a>
          </td>
      </tr>
    </tbody>
  </table>
</div>
            <div class="control-buttons">
                <a href="/backoffice/dottori/add" class="add-animal-btn" onclick="addAnimal()">
                    Aggiungi Dottore
                </a>



            </div>
</section>

<!-- Footer Section -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <img src="/image/logo.png" alt="Logo Catarsi">
            </div>
            <div class="footer-right">
                <div class="social-icons">
                    <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg"></a>
                    <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg"></a>
                    <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg"></a>
                </div>
                <div class="footer-credits">
                    <p>Crediti alla Fondazione Catarsi</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
