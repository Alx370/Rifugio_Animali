<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Animali</title>
    <link rel="stylesheet" href="/css/backofficeAggiungi.css">

</head>
<header>
    <nav>
        <div class="logo">
            <img src="/image/logo.png" alt="Logo Catarsi Group">
            CATARSI GROUP
        </div>
        <div class="house-icon">
            <a href="/">
                <img src="/image/house.svg" alt="casa">
            </a>
        </div>
    </nav>
</header>

<body>
    <div class="container">
        <div class="header">
        </div>


        <div class="main-content">
            <div class="form-container">
                <h2>Aggiungi Nuovo Diario</h2>
                <form id="diarioForm" method="post" th:action="@{/backoffice/diario/add}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    

            <!-- <div class="form-group">
                <label for="animale">Seleziona Animale</label>
                <select class="form-control" th:field="*{animale}" required>
                    <option value="" disabled selected>Scegli un animale</option>
                    <option th:each="animale : ${animali}"
                            th:value="${animale.id}"
                            th:text="${animale.nome + ' - ' + animale.specie}">
                    </option>
                </select>
            </div> -->



                    <div class="form-group">
                        <label for="storia_animale">Storia dell'animale</label>
                        <input type="text" class="form-control" id="storia_animale" name="storia_animale" required>
                    </div>
                    <div class="form-group">
                        <label for="stato_salute">Stato di salute</label>
                        <input type="text" class="form-control" id="stato_salute" name="stato_salute" required>
                    </div>
                    <div class="form-group">
                        <label for="stato_comportamentale">Stato comportamentale</label>
                        <input type="text" class="form-control" id="stato_comportamentale" name="stato_comportamentale" required>
                    </div>
                    <div class="form-group">
                        <label for="vaccinazioni">Vaccinazioni</label>
                        <input type="text" class="form-control" id="vaccinazioni" name="vaccinazioni" required>
                    </div>
                    <div class="form-group">
                        <label for="operazioni_effettuate">Operazioni effettuate</label>
                        <input type="text" class="form-control" id="operazioni_effettuate" name="operazioni_effettuate"  required>
                    </div>
                        <button type="submit" class="btn-primary">Aggiungi Diario</button>


            
        </div>
    </div>

    <!-- Footer Section -->
<footer class="footer">
    <div class="footer-content">
        <div class="footer-logo">
            <img src="/image/logo.png" alt="Logo Catarsi">
        </div>
        <div class="footer-right">
            <div class="social-icons">
                <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg">
                </a>
                <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg">
                </a>
                <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
                    <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg">
                </a>
            </div>
            <div class="footer-credits">
                <p>Crediti alla Fondazione Catarsi</p>
            </div>
        </div>
    </div>
</footer>


</body>
</html>
