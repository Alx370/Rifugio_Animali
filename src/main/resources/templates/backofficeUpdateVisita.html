<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Modifica Visita Veterinaria</title>
  <link rel="stylesheet" href="/css/backofficeAggiungi.css" />
</head>
<body>
<header>
  <nav>
    <div class="logo">
      <img src="/image/logo.png" alt="Logo Catarsi Group" />
      CATARSI GROUP
    </div>
    <div class="house-icon">
      <a href="/gest">
        <img src="/image/house.svg" alt="casa" />
      </a>
    </div>
  </nav>
</header>

<div class="container">
  <div class="main-content">
    <div class="form-container">
      <h2>Modifica Visita Veterinaria</h2>
      <form id="visitaForm" method="post" th:action="@{'/visite-veterinarie/' + ${visit.id}}" th:object="${visit}">
        <input type="hidden" name="_method" value="put" />
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
          <label for="visitDate">Data visita</label>
          <input type="date" class="form-control" th:field="*{visitDate}" id="visitDate" required />
        </div>

        <div class="form-group">
          <label for="animale">Animale</label>
          <select class="form-control" th:field="*{animal.id}" id="animale" required>
            <option value="" disabled>-- Seleziona un animale --</option>
            <option th:each="animale : ${animali}"
                    th:value="${animale.id}"
                    th:text="${animale.name}">
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="dottore">Dottore</label>
          <select class="form-control" th:field="*{veterinarian.id}" id="dottore" required>
            <option value="" disabled>-- Seleziona un dottore --</option>
            <option th:each="dottore : ${dottori}"
                    th:value="${dottore.id}"
                    th:text="${dottore.firstName + ' ' + dottore.lastName}">
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="visitType">Tipo visita</label>
          <input type="text" class="form-control" th:field="*{visitType}" id="visitType" />
        </div>

        <div class="form-group">
          <label for="descrizione">Descrizione</label>
          <textarea class="form-control" th:field="*{description}" id="descrizione" rows="4" required></textarea>
        </div>

        <div class="form-group">
          <label for="cost">Costo</label>
          <input type="number" class="form-control" th:field="*{cost}" id="cost" min="0" step="0.01" />
        </div>

        <button type="submit" class="edit-button">Salva Modifiche</button>
      </form>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-content">
    <div class="footer-logo">
      <img src="/image/logo.png" alt="Logo Catarsi" />
    </div>
    <div class="footer-right">
      <div class="social-icons">
        <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
          <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg" />
        </a>
        <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
          <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg" />
        </a>
        <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
          <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg" />
        </a>
      </div>
      <div class="footer-credits">
        <p>Crediti alla Fondazione Catarsi</p>
      </div>
    </div>
  </div>
</footer>
</body>
</html>
