<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accesso Richiesto</title>
  <link rel="stylesheet" href="/css/errore_richiesta_login.css">


</head>
<body>
  <!-- Header -->
  <header>
    <nav>
      <div class="logo">
        <img src="/image/logo.png" alt="Logo Catarsi Group">
        CATARSI GROUP
      </div>
    </nav>
  </header>


  <!-- Contenuto principale -->
  <div class="main-content">
    <div class="container">
      <div class="logo-container">
        <img src="/image/logo.png" alt="Logo" class="logo-img">
      </div>
      <h2>Accesso richiesto</h2>
      <p class="intro-text">Per eseguire questa azione devi aver effettuato il login.</p>
      <div class="back-home">
        <a href="/login" class="home-button">Login</a>
      </div>
    </div>
  </div>


  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-logo">
        <img src="/image/logo.png" alt="Logo Catarsi">
      </div>
      <div class="footer-right">
        <div class="social-icons">
          <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
            <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg">
          </a>
          <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
            <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg">
          </a>
          <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
            <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg">
          </a>
        </div>
        <div class="footer-credits">
          <p>Crediti alla Fondazione Catarsi</p>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
