<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Animali</title>
    <link rel="icon" type="image/x-icon" href="/image/favicon.png">
  <link rel="stylesheet" href="/css/backofficeAnimali.css">
</head>
<body>
      <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <img src="/image/logo.png" alt="Logo Catarsi Group">
                
                CATARSI GROUP
              </div>
              
            <div class="house-icon"><a href="/"><img src="/image/house.svg" alt="casa"></a>
            </div>
        </nav>
    </header>
    
<section class="animals-section">
    <div class="section-title">I NOSTRI UTENTI</div>

                
<div class="animals-table-container">
  <table style="width: 100%;">
    <thead>
      <tr>
        <th class="header-btn">Nome</th>
        <th class="header-btn">Cognome</th>
        <th class="header-btn">Email</th>
        <!-- <th class="header-btn">Password</th> -->
        <th class="header-btn">Telefono</th>
        <th class="header-btn">Sesso</th>
        <th class="header-btn">Data di nascita</th>
      </tr>
    </thead>
    <tbody >
      <tr class="table-row" onclick="selectRow(this)" th:each="utente : ${utenti}">

        <td th:text="${utente.nome}"></td>
        <td th:text="${utente.cognome}"></td>
        <td th:text="${utente.email}"></td>
        <!-- <td th:text="${utente.password}"></td> -->
        <td th:text="${utente.telefono}"></td>
        <td th:text="${utente.sesso}"></td>
        <td th:text="${utente.data_nascita}"></td>
        
      </tr>
    </tbody>
  </table>
</div>




</section>

<!-- Footer Section -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <img src="/image/logo.png" alt="Logo Catarsi">
            </div>
            <div class="footer-right">
                <div class="social-icons">
                    <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg"></a>
                    <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg"></a>
                    <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon"><img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg"></a>
                </div>
                <div class="footer-credits">
                    <p>Crediti alla Fondazione Catarsi</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
