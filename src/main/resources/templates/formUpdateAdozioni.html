<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adozione Animali</title>
  <link rel="stylesheet" href="/css/backofficeAggiungi.css">

</head>
<header>
  <nav>
    <div class="logo">
      <img src="/image/logo.png" alt="Logo Catarsi Group">
      CATARSI GROUP
    </div>
    <div class="house-icon">
      <a href="/gest">
        <img src="/image/house.svg" alt="casa">
      </a>
    </div>
  </nav>
</header>

<body>
<div class="container">
  <div class="header">
  </div>


  <div class="main-content">
    <div class="form-container">
      <h2>Modifica Adozione</h2>
      <form id="animalForm" method="post" th:action="@{/backoffice/adozioni/update/{id}(id=${adozione.id_adozione})}" th:object="${adozione}">
        <div class="form-group">
          <label for="Id_utente">Utente</label>
          <th:block th:if="${adozione.utente != null}">
            <input type="hidden" id="Id_utente" name="utente.email" th:value="${adozione.utente.email}" />
            <span th:text="${adozione.utente.nome + ' ' + adozione.utente.cognome + ' (' + adozione.utente.email + ')'}"></span>
          </th:block>

          <th:block th:if="${adozione.utente == null}">
            <span>Utente non disponibile</span>
          </th:block>
        </div>

        <div class="form-group">
          <label for="animale">Animale</label>
          <select th:field="*{animale}" required>
            <option value="" disabled selected>-- Seleziona un animale --</option>
            <option th:each="animale : ${animali}"
                    th:value="${animale.id_animale}"
                    th:text="${animale.nome}">
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="dataAdozione">Data di adozione</label>
          <input type="date" class="form-control" id="dataAdozione" name="data_adozione"
                 th:field="*{data_adozione}" th:value="${#dates.format(adozione.data_adozione, 'yyyy-MM-dd')}" required>
        </div>

        <button type="submit" class="edit-button">Salva Modifiche</button>
      </form>
    </div>
  </div>
</div>

<!-- Footer Section -->
<footer class="footer">
  <div class="footer-content">
    <div class="footer-logo">
      <img src="/image/logo.png" alt="Logo Catarsi">
    </div>
    <div class="footer-right">
      <div class="social-icons">
        <a href="https://facebook.com/catarsigroup" target="_blank" class="social-icon">
          <img src="/image/facebook-icon.svg" alt="Facebook" class="social-svg">
        </a>
        <a href="https://instagram.com/catarsigroup" target="_blank" class="social-icon">
          <img src="/image/instagram-icon.svg" alt="Instagram" class="social-svg">
        </a>
        <a href="https://tiktok.com/catarsigroup" target="_blank" class="social-icon">
          <img src="/image/tiktok-icon.svg" alt="TikTok" class="social-svg">
        </a>
      </div>
      <div class="footer-credits">
        <p>Crediti alla Fondazione Catarsi</p>
      </div>
    </div>
  </div>
</footer>


</body>
</html>
