application:
  title: rifugio/rifugio-animali
  version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include:
          - prometheus
          - info
          - health
          - metrics
      base-path: /actuator
  server:
    port: 9000

logging:
  level:
    root: "info"
    com.rifugio.animali: "debug"

server:
  port: 8080
  servlet:
    context-path: "/api"

spring:
  application:
    name: Rifugio_Animali
  profiles:
    active: psql

springdoc:
  api-docs:
    path: /v3/api-docs

---

spring:
  config:
    activate:
      on-profile: psql

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: ${DB_SCHEMA}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: ${DB_SCHEMA}
    open-in-view: true